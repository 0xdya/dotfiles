[general]
import = [ "tokyonight_night.toml" ]

[font]
size = 12.5
offset = { x = 0, y = 1 }
glyph_offset = { x = 0, y = 0 }

[window]
padding = {x = 10, y = 10}
opacity = 0.85

[font.normal]
family = "DejaVu Sans Mono"
style = "Regular"

[font.bold]
family = "DejaVu Sans Mono"
style = "Bold"

[font.italic]
family = "DejaVu Sans Mono"
style = "Italic"

[cursor]
style.shape = "underline"
